version: 2

models:
  - name: raw_documents
    description: EDINET 書類一覧 API (documents.json, type=2) の提出書類メタデータ。全項目を VARCHAR で保持し、型付け・リネームは stg 層で行う
    columns:
      - name: seqNumber
        description: ファイル日付ごとの連番
      - name: docID
        description: 書類管理番号（EDINET が書類ごとに採番する一意の番号）
      - name: edinetCode
        description: 提出者の EDINET コード
      - name: secCode
        description: 提出者の証券コード（上場会社のみ）
      - name: JCN
        description: 提出者の法人番号（13桁）
      - name: filerName
        description: 提出者名
      - name: fundCode
        description: ファンドコード
      - name: ordinanceCode
        description: 府令コード
      - name: formCode
        description: 様式コード
      - name: docTypeCode
        description: 書類種別コード（doc_types seed で名称に変換）
      - name: periodStart
        description: 期間（自）。有価証券報告書・半期報告書は事業年度、四半期報告書は四半期会計期間
      - name: periodEnd
        description: 期間（至）
      - name: submitDateTime
        description: 提出日時（YYYY-MM-DD hh:mm）
      - name: docDescription
        description: 提出書類概要
      - name: issuerEdinetCode
        description: 発行会社 EDINET コード
      - name: subjectEdinetCode
        description: 対象 EDINET コード
      - name: subsidiaryEdinetCode
        description: 子会社 EDINET コード
      - name: currentReportReason
        description: 臨時報告書の提出事由
      - name: parentDocID
        description: 親書類管理番号
      - name: opeDateTime
        description: 書類情報修正の操作日時
      - name: withdrawalStatus
        description: 取下区分（"0"以外は取下げに関する書類）
      - name: docInfoEditStatus
        description: 書類情報修正区分
      - name: disclosureStatus
        description: 開示不開示区分
      - name: xbrlFlag
        description: XBRL 有無フラグ（"1"=あり）
      - name: pdfFlag
        description: PDF 有無フラグ
      - name: attachDocFlag
        description: 代替書面・添付文書有無フラグ
      - name: englishDocFlag
        description: 英文ファイル有無フラグ
      - name: csvFlag
        description: CSV 有無フラグ
      - name: legalStatus
        description: 縦覧区分（"1"=縦覧中, "2"=延長期間中, "0"=閲覧期間満了）
      - name: _fetch_date
        description: 取得対象日（書類一覧 API のファイル日付。取得時メタ）

  - name: raw_companies
    description: EDINETコードリスト（EdinetcodeDlInfo.csv）の提出者マスタ。全項目を VARCHAR で保持し、型付け・リネームは stg 層で行う
    columns:
      - name: edinet_code
        description: EDINETコード（E+5桁）
      - name: submitter_type
        description: 提出者種別（内国法人・組合 等）
      - name: listing_status
        description: 上場区分（上場 / 非上場）
      - name: consolidated
        description: 連結の有無（有 / 無）
      - name: capital
        description: 資本金（出典CSVの単位のまま）
      - name: fiscal_year_end
        description: 決算日（"5月31日" 等の月日テキスト）
      - name: filer_name
        description: 提出者名
      - name: filer_name_en
        description: 提出者名（英字）
      - name: filer_name_kana
        description: 提出者名（ヨミ）
      - name: address
        description: 所在地
      - name: industry
        description: 提出者業種
      - name: sec_code
        description: 証券コード（末尾0付き5桁。非上場は空）
      - name: corporate_number
        description: 提出者法人番号（13桁）
      - name: _fetched_at
        description: コードリスト取得時刻（取得時メタ）

  - name: raw_funds
    description: ファンドコードリスト（FundcodeDlInfo.csv）のファンドマスタ。全項目を VARCHAR で保持し、型付け・リネームは stg 層で行う
    columns:
      - name: fund_code
        description: ファンドコード（G+5桁）
      - name: sec_code
        description: 証券コード（ファンドは多くが空）
      - name: fund_name
        description: ファンド名
      - name: fund_name_kana
        description: ファンド名（ヨミ）
      - name: security_type
        description: 特定有価証券区分名（内国投資信託受益証券 等）
      - name: specified_period_1
        description: 特定期1（決算期の月日テキスト）
      - name: specified_period_2
        description: 特定期2（月日テキスト。多くが空）
      - name: edinet_code
        description: 発行者（運用会社）の EDINETコード
      - name: issuer_name
        description: 発行者名
      - name: _fetched_at
        description: コードリスト取得時刻（取得時メタ）

  - name: raw_financial_facts
    description: 書類取得 API (type=5 CSV) の財務データ本体。要素ID×コンテキストの縦持ちファクト。全項目を VARCHAR で保持し、型付け・リネームは stg 層で行う
    columns:
      - name: doc_id
        description: 書類管理番号（documents と結合）
      - name: element_id
        description: XBRL 標準タクソノミの要素ID（例 jppfs_cor:NetSales）
      - name: item_name
        description: 要素の日本語ラベル
      - name: context_id
        description: コンテキストID（期間・連結区分・セグメント次元の識別子）
      - name: relative_year
        description: 相対年度（当期 / 前期 / 前々期 等）
      - name: consolidated_individual
        description: 連結・個別
      - name: period_instant
        description: 期間・時点
      - name: unit_id
        description: ユニットID
      - name: unit
        description: 単位（円 / 株 / ％ 等）
      - name: value
        description: 値（数値・テキストブロックを含む生の値）
      - name: _csv_type
        description: CSV 様式コード（jpcrp030000-asr=有報本体 / jpaud=監査 / jpsps=投信 等。取得時メタ）
      - name: _row_seq
        description: CSV 内の行番号（取得時メタ）
      - name: _fetched_at
        description: CSV 取得時刻（取得時メタ）
