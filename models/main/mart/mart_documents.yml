version: 2

models:
  - name: mart_documents
    description: EDINET 提出書類一覧（有価証券報告書・四半期報告書・大量保有報告書等のメタデータ。法人番号付き）
    config:
      meta:
        title: EDINET 書類一覧
        published: true
        source_url: "https://disclosure2.edinet-fsa.go.jp/"
        credit: >-
          このサービスは、金融庁 EDINET の書類一覧 API を使用していますが、
          提供情報の最新性、正確性、完全性等が保証されたものではありません
    columns:
      - name: doc_id
        meta:
          title: 書類管理番号
          description: EDINET が書類ごとに採番する一意の番号
      - name: seq_number
        meta:
          title: 連番
      - name: edinet_code
        meta:
          title: 提出者EDINETコード
      - name: sec_code
        meta:
          title: 提出者証券コード
      - name: corporate_number
        meta:
          title: 提出者法人番号
          description: 13桁。houjin_bangou / gbizinfo と結合できる
      - name: filer_name
        meta:
          title: 提出者名
      - name: fund_code
        meta:
          title: ファンドコード
      - name: ordinance_code
        meta:
          title: 府令コード
      - name: form_code
        meta:
          title: 様式コード
      - name: doc_type_code
        meta:
          title: 書類種別コード
      - name: doc_type_name
        meta:
          title: 書類種別
          description: 有価証券報告書、四半期報告書、大量保有報告書 等
      - name: period_start
        meta:
          title: 期間（自）
      - name: period_end
        meta:
          title: 期間（至）
      - name: submit_datetime
        meta:
          title: 提出日時
      - name: submit_date
        meta:
          title: 提出日
      - name: doc_description
        meta:
          title: 提出書類概要
      - name: issuer_edinet_code
        meta:
          title: 発行会社EDINETコード
      - name: subject_edinet_code
        meta:
          title: 対象EDINETコード
      - name: subsidiary_edinet_code
        meta:
          title: 子会社EDINETコード
      - name: current_report_reason
        meta:
          title: 臨報提出事由
      - name: parent_doc_id
        meta:
          title: 親書類管理番号
      - name: ope_datetime
        meta:
          title: 書類情報修正日時
      - name: withdrawal_status
        meta:
          title: 取下区分
      - name: is_withdrawn
        meta:
          title: 取下げ書類か
      - name: doc_info_edit_status
        meta:
          title: 書類情報修正区分
      - name: disclosure_status
        meta:
          title: 開示不開示区分
      - name: has_xbrl
        meta:
          title: XBRL有無
      - name: has_pdf
        meta:
          title: PDF有無
      - name: has_attach_doc
        meta:
          title: 代替書面・添付文書有無
      - name: has_english_doc
        meta:
          title: 英文ファイル有無
      - name: has_csv
        meta:
          title: CSV有無
      - name: legal_status
        meta:
          title: 縦覧区分
