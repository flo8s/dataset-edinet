version: 2

models:
  - name: mart_companies
    description: EDINET 企業マスタ（EDINETコードリスト。提出者の業種・市場区分・資本金・決算日・法人番号等。1行1提出者）
    config:
      meta:
        title: EDINET 企業マスタ
        published: true
        source_url: "https://disclosure2.edinet-fsa.go.jp/"
        credit: >-
          このサービスは、金融庁 EDINET のEDINETコードリストを使用していますが、
          提供情報の最新性、正確性、完全性等が保証されたものではありません
    columns:
      - name: edinet_code
        meta:
          title: EDINETコード
          description: E+5桁。mart_documents と edinet_code で結合できる
      - name: submitter_type
        meta:
          title: 提出者種別
          description: 内国法人・組合、外国法人 等
      - name: listing_status
        meta:
          title: 上場区分
          description: 上場 / 非上場
      - name: is_consolidated
        meta:
          title: 連結の有無
      - name: capital
        meta:
          title: 資本金
          description: 出典CSVの単位のまま
      - name: fiscal_year_end
        meta:
          title: 決算日
          description: "5月31日 等の月日"
      - name: filer_name
        meta:
          title: 提出者名
      - name: filer_name_en
        meta:
          title: 提出者名（英字）
      - name: filer_name_kana
        meta:
          title: 提出者名（ヨミ）
      - name: address
        meta:
          title: 所在地
      - name: industry
        meta:
          title: 提出者業種
      - name: sec_code
        meta:
          title: 証券コード
          description: 末尾0付き5桁。非上場は空
      - name: corporate_number
        meta:
          title: 提出者法人番号
          description: 13桁。houjin_bangou / gbizinfo と結合できる
