version: 2

models:
  - name: mart_funds
    description: EDINET ファンドマスタ（ファンドコードリスト。投資信託・ETF等の特定有価証券のファンド名・区分・発行者。1行1ファンド）
    config:
      meta:
        title: EDINET ファンドマスタ
        published: true
        source_url: "https://disclosure2.edinet-fsa.go.jp/"
        credit: >-
          このサービスは、金融庁 EDINET のファンドコードリストを使用していますが、
          提供情報の最新性、正確性、完全性等が保証されたものではありません
    columns:
      - name: fund_code
        meta:
          title: ファンドコード
          description: G+5桁。mart_documents と fund_code で結合できる
      - name: sec_code
        meta:
          title: 証券コード
          description: 上場ファンド等のみ。多くは空
      - name: fund_name
        meta:
          title: ファンド名
      - name: fund_name_kana
        meta:
          title: ファンド名（ヨミ）
      - name: security_type
        meta:
          title: 特定有価証券区分名
          description: 内国投資信託受益証券、外国投資信託受益証券 等
      - name: specified_period_1
        meta:
          title: 特定期1
          description: 決算期の月日
      - name: specified_period_2
        meta:
          title: 特定期2
      - name: edinet_code
        meta:
          title: 発行者EDINETコード
          description: 発行者（運用会社）の EDINETコード。mart_companies と結合できる
      - name: issuer_name
        meta:
          title: 発行者名
