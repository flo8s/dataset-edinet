name = "edinet"
command = "python main.py"

[targets.default]
url = "s3://${FDL_S3_BUCKET}"
public_url = "https://data.queria.io"
s3_endpoint = "${FDL_S3_ENDPOINT}"
s3_access_key_id = "${FDL_S3_ACCESS_KEY_ID}"
s3_secret_access_key = "${FDL_S3_SECRET_ACCESS_KEY}"

[targets.local]
url = "~/.local/share/fdl"
public_url = "http://localhost:4001"

[meta]
license = "金融庁 EDINET 利用規約"
license_url = "https://disclosure2.edinet-fsa.go.jp/"
title = "EDINET 書類一覧"
description = "金融庁 EDINET の開示書類一覧（有価証券報告書・四半期報告書・大量保有報告書等のメタデータ）。提出者法人番号付きで houjin_bangou / gbizinfo と結合できる。"
cover = "📑"
tags = ['EDINET', '有価証券報告書', '開示', '企業', '法人番号']
repository_url = "https://github.com/flo8s/dataset-edinet"
schedule = "daily"

[meta.schemas.main]
title = "EDINET 書類一覧"
